name: Gradle Build e Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --build-cache --parallel

    - name: Collect and sanitize artifacts
      run: |
        mkdir -p release-artifacts
        
        VERSION=${GITHUB_REF#refs/tags/v}
        
        copy_clean_jar() {
          local folder=$1
          local loader_name=$2
          
          for jar in $folder/build/libs/*.jar; do
            if [[ -f "$jar" && ! "$jar" =~ -(dev|sources|plain|javadoc)\.jar$ ]]; then
              cp "$jar" "release-artifacts/LucidAdvancements ${loader_name} ${VERSION}.jar"
            fi
          done
        }
        
        copy_clean_jar "fabric" "Fabric"
        copy_clean_jar "forge" "Forge"
        copy_clean_jar "neoforge" "NeoForge"
        
        ls -lh release-artifacts/

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: release-artifacts/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}