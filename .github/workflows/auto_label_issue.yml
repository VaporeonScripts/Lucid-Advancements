name: Auto Label Issues
on:
  issues:
    types: [opened, edited]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse Issue Body and Add Labels
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            if (!body) return;
            
            const labelsToAdd = [];
            
            if (body.includes('Fabric/Quilt')) {
              labelsToAdd.push('loader: fabric');
            }
            if (body.includes('NeoForge')) {
              labelsToAdd.push('loader: neoforge');
            } else if (body.includes('Forge')) {
              labelsToAdd.push('loader: forge');
            }
            
            if (body.includes('Game Crash')) labelsToAdd.push('type: crash');
            if (body.includes('Visual Bug')) labelsToAdd.push('type: visual');
            if (body.includes('Compatibility Issue')) labelsToAdd.push('type: compatibility');
            
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd
              });
            }